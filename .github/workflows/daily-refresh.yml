name: Daily Data Refresh

on:
  schedule:
    # 6:05 AM ET every weekday (Mon–Fri), 11:05 UTC
    - cron: "5 11 * * 1-5"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run factor scorer
        run: python scripts/fetch_factors.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json
          git diff --staged --quiet || git commit -m "chore: daily factor refresh $(date -u +%Y-%m-%d)"
          git push
